image: node:20-alpine

stages:
  - validate
  - deploy

cache:
  paths:
    - node_modules/

validate:
  stage: validate
  script:
    - npm ci
    - node scripts/validate.js
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

pages:
  stage: deploy
  script:
    - npm ci
    - node scripts/validate.js
    - FAMILY_PASSWORD=$FAMILY_PASSWORD node scripts/encrypt.js
    - cp -r data dist/data
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: $CI_PAGES_URL
