<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Family Tree — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #2a3326;
      --ink-soft: #5a6a55;
      --line: #d8e0d2;
      --line-soft: #eef1ea;
      --trunk: #5C3317;
      --trunk-dark: #3e2210;
      --green-1: #2D7A2D;
      --green-2: #4CAF50;
      --green-3: #81C784;
      --green-4: #A5D6A7;
      --cream: #f5efdf;
      --cream-edge: #e7dfca;
      --wood: #8a5a36;
      --wood-dark: #5C3317;
      --silhouette: #2c1a10;
      --sunset-1: #f6a96b;
      --sunset-2: #e6824a;
      --sunset-3: #b85a2a;
      --sunset-glow: #ffd9a8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffeed9 0%, #fff5e8 60%, #ffffff 100%);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      animation: skyCycle 36s linear infinite, textCycle 36s linear infinite;
    }

    /* Day / night sky cycle: dawn → day → sunset → night → dawn */
    @keyframes skyCycle {
      0% {
        background: linear-gradient(to bottom, #ffcfa8 0%, #ffe8d0 40%, #fffaf0 100%);
      }

      /* sunrise */
      14% {
        background: linear-gradient(to bottom, #b7e0f2 0%, #e0f0fa 50%, #ffffff 100%);
      }

      /* spring day */
      28% {
        background: linear-gradient(to bottom, #aedcf0 0%, #ddeefa 50%, #ffffff 100%);
      }

      /* summer */
      42% {
        background: linear-gradient(to bottom, #b8c8d4 0%, #c8d4dc 50%, #d8e0e4 100%);
      }

      /* rainy / monsoon */
      56% {
        background: linear-gradient(to bottom, #f6a96b 0%, #ffcfa8 45%, #ffe6d0 100%);
      }

      /* autumn sunset */
      70% {
        background: linear-gradient(to bottom, #6a4e7a 0%, #3d3654 50%, #20243c 100%);
      }

      /* dusk */
      84% {
        background: linear-gradient(to bottom, #cfe0ec 0%, #e4ecf2 50%, #f4f7fa 100%);
      }

      /* winter day */
      92% {
        background: linear-gradient(to bottom, #1a2540 0%, #15203a 50%, #0e1830 100%);
      }

      /* winter night */
      100% {
        background: linear-gradient(to bottom, #ffcfa8 0%, #ffe8d0 40%, #fffaf0 100%);
      }
    }

    /* Body text color cycles with the sky so it stays legible against changing backgrounds */
    @keyframes textCycle {
      0% {
        color: #3a2418;
      }

      28% {
        color: #2a3326;
      }

      42% {
        color: #2c3a44;
      }

      56% {
        color: #3e2210;
      }

      70% {
        color: #f0e4d6;
      }

      84% {
        color: #2a3a48;
      }

      92% {
        color: #f0e4d6;
      }

      100% {
        color: #3a2418;
      }
    }

    .dedication,
    .new-here,
    .row-options,
    .remember,
    .field label,
    .wordmark h1,
    .wordmark .eyebrow,
    .dedication .line-1,
    .dedication .line-2 {
      animation: textCycle 36s linear infinite;
    }

    /* Override: keep dedication script ALWAYS readable in dark phases by boosting weight */
    .wordmark h1,
    .dedication .line-1 {
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Rain layer for monsoon season */
    .rain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      animation: rainShow 36s linear infinite;
      opacity: 0;
    }

    @keyframes rainShow {

      0%,
      35% {
        opacity: 0;
      }

      42% {
        opacity: 0.7;
      }

      50% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    .rain-drop {
      position: absolute;
      width: 1.5px;
      height: 14px;
      background: linear-gradient(to bottom, rgba(180, 210, 230, 0) 0%, rgba(180, 210, 230, 0.85) 100%);
      border-radius: 1px;
      animation: rainfall 0.9s linear infinite;
    }

    @keyframes rainfall {
      0% {
        transform: translateY(-30px);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(320px);
        opacity: 0;
      }
    }

    /* Snow for winter */
    .snow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      animation: snowShow 36s linear infinite;
      opacity: 0;
    }

    @keyframes snowShow {

      0%,
      76% {
        opacity: 0;
      }

      84% {
        opacity: 0.85;
      }

      92% {
        opacity: 0.7;
      }

      100% {
        opacity: 0;
      }
    }

    .snow-flake {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      animation: snowfall 6s linear infinite;
    }

    @keyframes snowfall {
      0% {
        transform: translate(0, -30px);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translate(var(--dx, 0), 360px);
        opacity: 0;
      }
    }

    .page {
      max-width: 460px;
      margin: 0 auto;
      padding: 28px 22px 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ---------- Wordmark ---------- */
    .wordmark {
      text-align: center;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.2s forwards;
    }

    .wordmark .eyebrow {
      font-family: "Inter", sans-serif;
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }

    .wordmark h1 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-style: italic;
      font-size: 30px;
      letter-spacing: 0.01em;
      color: var(--ink);
      margin: 0;
    }

    /* ---------- Tree stage ---------- */
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-top: 4px;
    }

    .stage svg.tree {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Mother photo placed via foreignObject in SVG */
    .center-frame-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Sway groups */
    .sway {
      transform-box: fill-box;
      transform-origin: 50% 100%;
    }

    .sway-a {
      animation: swayA 5.2s ease-in-out infinite;
    }

    .sway-b {
      animation: swayB 4.6s ease-in-out infinite;
      animation-delay: -0.7s;
    }

    .sway-c {
      animation: swayC 5.8s ease-in-out infinite;
      animation-delay: -1.4s;
    }

    @keyframes swayA {

      0%,
      100% {
        transform: rotate(-1.2deg) translateY(0);
      }

      50% {
        transform: rotate(1.4deg) translateY(-1px);
      }
    }

    @keyframes swayB {

      0%,
      100% {
        transform: rotate(1.1deg) translateY(0);
      }

      50% {
        transform: rotate(-1.3deg) translateY(-1.2px);
      }
    }

    @keyframes swayC {

      0%,
      100% {
        transform: rotate(-0.9deg) translateY(0);
      }

      50% {
        transform: rotate(1.0deg) translateY(-0.8px);
      }
    }

    /* Frames hang with a gentle sway */
    .hang {
      transform-box: fill-box;
      transform-origin: 50% 0%;
    }

    .hang-1 {
      animation: hangA 4.8s ease-in-out infinite;
    }

    .hang-2 {
      animation: hangB 5.4s ease-in-out infinite;
      animation-delay: -0.6s;
    }

    .hang-3 {
      animation: hangA 5.0s ease-in-out infinite;
      animation-delay: -1.2s;
    }

    .hang-4 {
      animation: hangB 4.4s ease-in-out infinite;
      animation-delay: -0.9s;
    }

    @keyframes hangA {

      0%,
      100% {
        transform: rotate(-1.4deg);
      }

      50% {
        transform: rotate(1.2deg);
      }
    }

    @keyframes hangB {

      0%,
      100% {
        transform: rotate(1.2deg);
      }

      50% {
        transform: rotate(-1.4deg);
      }
    }

    /* Center frame glow */
    .center-frame-glow {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: breathe 3.6s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: 0.35;
        transform: scale(1);
      }

      50% {
        opacity: 0.85;
        transform: scale(1.06);
      }
    }

    /* Silhouettes warm gentle fade */
    .silhouettes {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: silhouetteBreathe 4.2s ease-in-out infinite;
    }

    @keyframes silhouetteBreathe {

      0%,
      100% {
        opacity: 0.78;
      }

      50% {
        opacity: 1.0;
      }
    }

    /* Sky elements: sun + clouds, drifting on a gentle breeze */
    .sun {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: sunArc 36s linear infinite, sunVisibility 36s linear infinite;
    }

    /* Sun travels in an arc across the sky synced with skyCycle */
    @keyframes sunArc {
      0% {
        transform: translate(-220px, 360px) scale(0.9);
      }

      /* dawn, low left */
      14% {
        transform: translate(-60px, -200px) scale(1.0);
      }

      /* morning */
      28% {
        transform: translate(0px, -260px) scale(1.0);
      }

      /* noon */
      42% {
        transform: translate(80px, -200px) scale(1.0);
      }

      56% {
        transform: translate(220px, 360px) scale(1.1);
      }

      /* sunset at horizon */
      62% {
        transform: translate(240px, 520px) scale(1.1);
      }

      /* dipped below */
      100% {
        transform: translate(-220px, 360px) scale(0.9);
      }
    }

    /* Sun is hidden once it dips below the horizon */
    @keyframes sunVisibility {
      0% {
        opacity: 0.85;
        filter: saturate(1.3);
      }

      14%,
      42% {
        opacity: 1;
        filter: saturate(0.9);
      }

      56% {
        opacity: 1;
        filter: saturate(1.5);
      }

      /* at horizon, glowing */
      60% {
        opacity: 0;
      }

      /* below horizon: vanish */
      99% {
        opacity: 0;
      }

      100% {
        opacity: 0.85;
        filter: saturate(1.3);
      }
    }

    /* Moon appears only at night */
    .moon {
      animation: moonShow 32s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes moonShow {

      0%,
      60% {
        opacity: 0;
        transform: translateY(-20px);
      }

      72% {
        opacity: 0.7;
        transform: translateY(0);
      }

      85% {
        opacity: 1;
        transform: translateY(0);
      }

      95% {
        opacity: 0.7;
        transform: translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateY(-20px);
      }
    }

    .star {
      animation: twinkle 3s ease-in-out infinite;
      opacity: 0;
    }

    .stars {
      animation: starsShow 32s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes starsShow {

      0%,
      60% {
        opacity: 0;
      }

      72% {
        opacity: 0.6;
      }

      85% {
        opacity: 1;
      }

      95% {
        opacity: 0.6;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.35;
      }

      50% {
        opacity: 1;
      }
    }

    /* Canopy seasons cycle — hue + saturation shift to suggest spring → summer → autumn → winter */
    .canopy-seasons {
      animation: seasonCycle 32s ease-in-out infinite;
    }

    @keyframes seasonCycle {
      0% {
        filter: hue-rotate(0deg) saturate(1) brightness(1);
      }

      /* spring */
      18% {
        filter: hue-rotate(-8deg) saturate(1.15) brightness(1.02);
      }

      /* summer */
      38% {
        filter: hue-rotate(-5deg) saturate(1.1) brightness(1);
      }

      /* late summer */
      55% {
        filter: hue-rotate(50deg) saturate(0.85) brightness(0.95);
      }

      /* autumn / sunset */
      72% {
        filter: hue-rotate(20deg) saturate(0.5) brightness(0.75);
      }

      /* late autumn / dusk */
      85% {
        filter: hue-rotate(0deg) saturate(0.3) brightness(0.45);
      }

      /* winter night */
      100% {
        filter: hue-rotate(0deg) saturate(1) brightness(1);
      }

      /* back to spring */
    }

    .cloud-1 {
      animation: drift1 42s linear infinite;
    }

    .cloud-2 {
      animation: drift2 56s linear infinite;
    }

    .cloud-3 {
      animation: drift1 64s linear infinite;
      animation-delay: -22s;
    }

    @keyframes drift1 {
      0% {
        transform: translateX(-80px);
      }

      100% {
        transform: translateX(700px);
      }
    }

    @keyframes drift2 {
      0% {
        transform: translateX(680px);
      }

      100% {
        transform: translateX(-120px);
      }
    }

    /* Tree cast-shadow — soft cool tone pooling under the canopy where the family stands */
    .tree-shadow {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: shadowBreathe 5.4s ease-in-out infinite;
    }

    @keyframes shadowBreathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.55;
      }

      50% {
        transform: scale(1.03);
        opacity: 0.72;
      }
    }

    /* Fireflies / particle layer */
    /* Birds flying across the scene */
    .bird-flock-1 {
      animation: birdsAcross1 18s linear infinite;
    }

    .bird-flock-2 {
      animation: birdsAcross2 22s linear infinite;
      animation-delay: -8s;
    }

    @keyframes birdsAcross1 {
      0% {
        transform: translate(-60px, 10px);
        opacity: 0;
      }

      8% {
        opacity: 1;
      }

      50% {
        transform: translate(300px, -8px);
        opacity: 1;
      }

      92% {
        opacity: 1;
      }

      100% {
        transform: translate(680px, -22px);
        opacity: 0;
      }
    }

    @keyframes birdsAcross2 {
      0% {
        transform: translate(640px, 60px);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      50% {
        transform: translate(300px, 50px);
        opacity: 0.9;
      }

      90% {
        opacity: 0.9;
      }

      100% {
        transform: translate(-80px, 38px);
        opacity: 0;
      }
    }

    .bird-wing-a {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: flap 0.45s ease-in-out infinite;
    }

    .bird-wing-b {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: flap 0.52s ease-in-out infinite;
      animation-delay: -0.18s;
    }

    .bird-wing-c {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: flap 0.40s ease-in-out infinite;
      animation-delay: -0.10s;
    }

    @keyframes flap {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(0.45);
      }
    }

    /* Breeze wind streaks brushing past the family */
    .breeze-streak {
      transform-box: fill-box;
      transform-origin: 0% 50%;
    }

    .breeze-1 {
      animation: breeze 4.2s ease-in-out infinite;
    }

    .breeze-2 {
      animation: breeze 5.0s ease-in-out infinite;
      animation-delay: -1.2s;
    }

    .breeze-3 {
      animation: breeze 4.6s ease-in-out infinite;
      animation-delay: -2.4s;
    }

    @keyframes breeze {
      0% {
        transform: translateX(-40px) scaleX(0.4);
        opacity: 0;
      }

      20% {
        opacity: 0.55;
      }

      60% {
        opacity: 0.55;
      }

      100% {
        transform: translateX(140px) scaleX(1);
        opacity: 0;
      }
    }

    /* Sunset wash behind the tree */
    .sunset-wash {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: sunsetBreathe 8s ease-in-out infinite;
    }

    @keyframes sunsetBreathe {

      0%,
      100% {
        opacity: 0.55;
      }

      50% {
        opacity: 0.85;
      }
    }

    /* Original fireflies / particles layer */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 215, 134, 0.95) 0%, rgba(168, 215, 134, 0.0) 70%);
      bottom: 14%;
      opacity: 0;
      will-change: transform, opacity;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(0.8);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      50% {
        opacity: 0.7;
      }

      100% {
        transform: translate(var(--dx, 0), -260px) scale(1.1);
        opacity: 0;
      }
    }

    /* ---------- Dedication ---------- */
    .dedication {
      text-align: center;
      margin-top: 6px;
      padding: 0 14px;
      opacity: 0;
      animation: fadeIn 1.6s ease-out 1.0s forwards;
    }

    .rule {
      width: 38px;
      height: 1px;
      background: var(--green-1);
      margin: 0 auto 14px;
      opacity: 0.55;
    }

    .dedication .line-1 {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 500;
      font-size: 21px;
      line-height: 1.35;
      color: #2a3326;
      margin: 0 0 8px;
      letter-spacing: 0.005em;
    }

    .dedication .line-1 .accent {
      color: var(--green-1);
      font-weight: 600;
    }

    .dedication .line-2 {
      font-family: "Inter", sans-serif;
      font-size: 11.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 0;
    }

    .dedication .line-2 .sep {
      display: inline-block;
      width: 6px;
      height: 1px;
      background: var(--ink-soft);
      vertical-align: middle;
      margin: 0 8px;
      opacity: 0.6;
    }

    /* ---------- Login form ---------- */
    .form {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 1.6s forwards;
    }

    .field {
      position: relative;
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 9px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 26px 14px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font-family: "Inter", sans-serif;
      font-size: 15px;
      color: var(--ink);
      transition: border-color .18s ease, box-shadow .18s ease;
      -webkit-appearance: none;
      outline: none;
    }

    .field input:hover {
      border-color: #c8d2c0;
    }

    .field input:focus {
      border-color: var(--green-1);
      box-shadow: 0 0 0 4px rgba(45, 122, 45, 0.10);
    }

    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2px 2px 4px;
      font-size: 12.5px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-soft);
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      accent-color: var(--green-1);
    }

    .forgot {
      color: var(--green-1);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    button.signin {
      margin-top: 4px;
      width: 100%;
      padding: 15px 16px;
      background: var(--green-1);
      color: #fff;
      border: 0;
      border-radius: 10px;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform .12s ease, background .15s ease, box-shadow .15s ease;
      box-shadow: 0 6px 18px -8px rgba(45, 122, 45, 0.55);
    }

    button.signin:hover {
      background: #266a26;
    }

    button.signin:active {
      transform: translateY(1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink-soft);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin: 8px 0 2px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .new-here {
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      margin: 0;
    }

    .new-here a {
      color: var(--green-1);
      font-weight: 600;
      text-decoration: none;
    }

    .new-here a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /* ---------- Top Tabs ---------- */
    .top-tabs {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-20px);
      transition: all 0.5s ease;
    }

    .top-tabs.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .top-tabs button {
      background: none;
      border: none;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .top-tabs button:hover {
      background: var(--line-soft);
      color: var(--ink);
    }

    .top-tabs button.active {
      color: var(--green-1);
      background: rgba(45, 122, 45, 0.1);
      font-weight: 600;
    }

    /* ---------- Multi-Step Form ---------- */
    .form-step {
      display: none;
      animation: fadeInStep 0.4s ease-out forwards;
    }

    .form-step.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @keyframes fadeInStep {
      from {
        opacity: 0;
        transform: translateX(10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* DOB Input Styling */
    .dob-container {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dob-container input[type="text"] {
      flex: 1;
    }

    .dob-container input[type="date"] {
      position: absolute;
      opacity: 0;
      width: 40px;
      height: 40px;
      right: 0;
      top: 0;
      cursor: pointer;
    }

    .calendar-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--line-soft);
      border-radius: 10px;
      color: var(--ink-soft);
      position: relative;
    }

    .calendar-icon svg {
      width: 20px;
      height: 20px;
    }

    /* Auth Code Input */
    .totp-box {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .totp-d {
      width: 40px;
      height: 48px;
      border: 0.5px solid rgba(90, 60, 30, .25);
      border-radius: 8px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--g-text, #1a3a2a);
    }

    .totp-d:focus {
      border-color: var(--g-text, #1a3a2a);
      outline: none;
    }
  </style>
</head>

    <!-- ============================================================

         ============================================================ -->
    <section class="dedication">
      <div class="rule"></div>
      <p class="line-1">
        Dedicated to my beloved mother,
        <span class="accent">Baby</span>
      </p>
      <p class="line-2">
        Jyoti Sathawane
        <span class="sep"></span>
        Forever in our hearts
      </p>
    </section>

    <!-- ============================================================
         LOGIN FORM (Multi-Step)
         ============================================================ -->
    <form class="form" id="loginForm" autocomplete="off" onsubmit="event.preventDefault();">

      <!-- Step 1: Family Password -->
      <div class="form-step active" id="step1">
        <div class="field">
          <label for="familyPassword">Family Password</label>
          <input id="familyPassword" type="password" placeholder="••••••••" required />
        </div>
        <button class="signin" type="button" onclick="nextStep()">CONTINUE</button>
      </div>

      <!-- Step 2: Name & DOB -->
      <div class="form-step" id="step2">
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" type="text" placeholder="Your Name" required />
        </div>
        <div class="field">
          <label for="dob">Date of Birth</label>
          <div class="dob-container">
            <input id="dob" type="text" placeholder="dd/mm/yyyy" pattern="\d{2}/\d{2}/\d{4}" maxlength="10"
              oninput="formatDOB(this)" required />
            <div class="calendar-icon">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z" />
              </svg>
              <input type="date" onchange="syncDate(this)" />
            </div>
          </div>
        </div>
        <button class="signin" type="button" onclick="nextStep2()">CONTINUE</button>
      </div>

      <!-- Step 3: Auth Code -->
      <div class="form-step" id="step3">
        <div style="margin-bottom: 8px; text-align: center;">
          <label
            style="display: block; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px;">Authentication
            Code</label>
          <div class="totp-box" id="totp-box">
            <input type="text" class="totp-d" maxlength="1" onkeyup="totpInput(this,0)" onpaste="totpPaste(event)"
              style="padding: 0;" />
            <input type="text" class="totp-d" maxlength="1" onkeyup="totpInput(this,1)" style="padding: 0;" />
            <input type="text" class="totp-d" maxlength="1" onkeyup="totpInput(this,2)" style="padding: 0;" />
            <input type="text" class="totp-d" maxlength="1" onkeyup="totpInput(this,3)" style="padding: 0;" />
            <input type="text" class="totp-d" maxlength="1" onkeyup="totpInput(this,4)" style="padding: 0;" />
            <input type="text" class="totp-d" maxlength="1" onkeyup="totpInput(this,5)" style="padding: 0;" />
          </div>
        </div>
        <button class="signin" type="submit" onclick="completeLogin()">VERIFY & ENTER</button>
      </div>

    </form>
  </main>

  <script>
    // Generate firefly particles
    (function () {
      const layer = document.getElementById('particles');
      if (!layer) return;
      const COUNT = 22;
      for (let i = 0; i < COUNT; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const left = 6 + Math.random() * 88;         // % across
        const size = 2 + Math.random() * 3.8;        // px
        const dx = (Math.random() - 0.5) * 160;    // breeze drift x
        const dur = 6 + Math.random() * 5;          // s
        const delay = -Math.random() * dur;          // start at random phase
        p.style.left = left + '%';
        p.style.width = p.style.height = size + 'px';
        p.style.setProperty('--dx', dx + 'px');
        p.style.animation = `drift ${dur}s linear ${delay}s infinite`;
        layer.appendChild(p);
      }
    })();
    // Rain
    (function () {
      const layer = document.getElementById('rain');
      if (!layer) return;
      for (let i = 0; i < 60; i++) {
        const d = document.createElement('span');
        d.className = 'rain-drop';
        d.style.left = (Math.random() * 100) + '%';
        d.style.top = (Math.random() * 60) + '%';
        d.style.animationDelay = (-Math.random() * 0.9) + 's';
        d.style.animationDuration = (0.7 + Math.random() * 0.5) + 's';
        layer.appendChild(d);
      }
    })();
    // Snow
    (function () {
      const layer = document.getElementById('snow');
      if (!layer) return;
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('span');
        s.className = 'snow-flake';
        s.style.left = (Math.random() * 100) + '%';
        s.style.top = (-Math.random() * 30) + '%';
        s.style.setProperty('--dx', ((Math.random() - 0.5) * 80) + 'px');
        s.style.animationDelay = (-Math.random() * 6) + 's';
        s.style.animationDuration = (5 + Math.random() * 4) + 's';
        s.style.opacity = 0.6 + Math.random() * 0.4;
        layer.appendChild(s);
      }
    })();

    // Multi-Step Form Logic
    function nextStep() {
      const pwd = document.getElementById('familyPassword').value;
      if (pwd.trim() === '') {
        alert('Please enter the family password.');
        return;
      }
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
    }

    // Format DOB as dd/mm/yyyy
    function formatDOB(input) {
      let val = input.value.replace(/\D/g, '');
      if (val.length > 2) val = val.slice(0, 2) + '/' + val.slice(2);
      if (val.length > 5) val = val.slice(0, 5) + '/' + val.slice(5, 9);
      input.value = val;
    }

    // Sync native date picker to the text field
    function syncDate(input) {
      if (!input.value) return;
      const parts = input.value.split('-'); // input.value is always yyyy-mm-dd
      if (parts.length === 3) {
        document.getElementById('dob').value = `${parts[2]}/${parts[1]}/${parts[0]}`;
      }
    }

    // Complete Login and show Tabs
    function nextStep2() {
      const name = document.getElementById('fullName').value;
      const dob = document.getElementById('dob').value;
      if (!name.trim() || !dob.trim()) {
        alert('Please fill out all fields.');
        return;
      }
      if (dob.length !== 10) {
        alert('Please enter a valid date of birth (dd/mm/yyyy).');
        return;
      }
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step3').classList.add('active');
      setTimeout(() => document.querySelectorAll('.totp-d')[0].focus(), 100);
    }

    function totpInput(input, index) {
      if (input.value.length === 1 && index < 5) {
        document.querySelectorAll('.totp-d')[index + 1].focus();
      }
      // Simple backspace handling if empty
      if (input.value.length === 0 && index > 0 && event.key === 'Backspace') {
        document.querySelectorAll('.totp-d')[index - 1].focus();
      }
    }

    function totpPaste(event) {
      event.preventDefault();
      let paste = (event.clipboardData || window.clipboardData).getData('text');
      paste = paste.replace(/\D/g, '').substring(0, 6);
      const inputs = document.querySelectorAll('.totp-d');
      for (let i = 0; i < paste.length; i++) {
        inputs[i].value = paste[i];
      }
      if (paste.length > 0) {
        inputs[Math.min(paste.length, 5)].focus();
      }
    }

    function completeLogin() {
      const inputs = document.querySelectorAll('.totp-d');
      const code = Array.from(inputs).map(i => i.value).join('');
      if (code.length !== 6) {
        alert('Please enter the 6-digit authentication code.');
        return;
      }

      // Hide form
      document.getElementById('loginForm').style.display = 'none';

      // Show tabs
      document.getElementById('topTabs').classList.add('visible');

      // Smooth scroll to top to see the full tree and tabs
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
