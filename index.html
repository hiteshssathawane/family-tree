<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Family Tree — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="vendor/otpauth.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #2a3326;
      --ink-soft: #5a6a55;
      --line: #d8e0d2;
      --line-soft: #eef1ea;
      --trunk: #5C3317;
      --trunk-dark: #3e2210;
      --green-1: #2D7A2D;
      --green-2: #4CAF50;
      --green-3: #81C784;
      --green-4: #A5D6A7;
      --cream: #f5efdf;
      --cream-edge: #e7dfca;
      --wood: #8a5a36;
      --wood-dark: #5C3317;
      --silhouette: #2c1a10;
      --sunset-1: #f6a96b;
      --sunset-2: #e6824a;
      --sunset-3: #b85a2a;
      --sunset-glow: #ffd9a8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffeed9 0%, #fff5e8 60%, #ffffff 100%);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      animation: skyCycle 36s linear infinite, textCycle 36s linear infinite;
    }

    /* Day / night sky cycle: dawn → day → sunset → night → dawn */
    @keyframes skyCycle {
      0% {
        background: linear-gradient(to bottom, #ffcfa8 0%, #ffe8d0 40%, #fffaf0 100%);
      }

      /* sunrise */
      14% {
        background: linear-gradient(to bottom, #b7e0f2 0%, #e0f0fa 50%, #ffffff 100%);
      }

      /* spring day */
      28% {
        background: linear-gradient(to bottom, #aedcf0 0%, #ddeefa 50%, #ffffff 100%);
      }

      /* summer */
      42% {
        background: linear-gradient(to bottom, #b8c8d4 0%, #c8d4dc 50%, #d8e0e4 100%);
      }

      /* rainy / monsoon */
      56% {
        background: linear-gradient(to bottom, #f6a96b 0%, #ffcfa8 45%, #ffe6d0 100%);
      }

      /* autumn sunset */
      70% {
        background: linear-gradient(to bottom, #6a4e7a 0%, #3d3654 50%, #20243c 100%);
      }

      /* dusk */
      84% {
        background: linear-gradient(to bottom, #cfe0ec 0%, #e4ecf2 50%, #f4f7fa 100%);
      }

      /* winter day */
      92% {
        background: linear-gradient(to bottom, #1a2540 0%, #15203a 50%, #0e1830 100%);
      }

      /* winter night */
      100% {
        background: linear-gradient(to bottom, #ffcfa8 0%, #ffe8d0 40%, #fffaf0 100%);
      }
    }

    /* Body text color cycles with the sky so it stays legible against changing backgrounds */
    @keyframes textCycle {
      0% {
        color: #3a2418;
      }

      28% {
        color: #2a3326;
      }

      42% {
        color: #2c3a44;
      }

      56% {
        color: #3e2210;
      }

      70% {
        color: #f0e4d6;
      }

      84% {
        color: #2a3a48;
      }

      92% {
        color: #f0e4d6;
      }

      100% {
        color: #3a2418;
      }
    }

    .dedication,
    .new-here,
    .row-options,
    .remember,
    .field label,
    .login-wordmark h1,
    .login-wordmark .eyebrow,
    .dedication .line-1,
    .dedication .line-2 {
      animation: textCycle 36s linear infinite;
    }

    /* Override: keep dedication script ALWAYS readable in dark phases by boosting weight */
    .login-wordmark h1,
    .dedication .line-1 {
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Rain layer for monsoon season */
    .rain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      animation: rainShow 36s linear infinite;
      opacity: 0;
    }

    @keyframes rainShow {

      0%,
      35% {
        opacity: 0;
      }

      42% {
        opacity: 0.7;
      }

      50% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    .rain-drop {
      position: absolute;
      width: 1.5px;
      height: 14px;
      background: linear-gradient(to bottom, rgba(180, 210, 230, 0) 0%, rgba(180, 210, 230, 0.85) 100%);
      border-radius: 1px;
      animation: rainfall 0.9s linear infinite;
    }

    @keyframes rainfall {
      0% {
        transform: translateY(-30px);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(320px);
        opacity: 0;
      }
    }

    /* Snow for winter */
    .snow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      animation: snowShow 36s linear infinite;
      opacity: 0;
    }

    @keyframes snowShow {

      0%,
      76% {
        opacity: 0;
      }

      84% {
        opacity: 0.85;
      }

      92% {
        opacity: 0.7;
      }

      100% {
        opacity: 0;
      }
    }

    .snow-flake {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      animation: snowfall 6s linear infinite;
    }

    @keyframes snowfall {
      0% {
        transform: translate(0, -30px);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translate(var(--dx, 0), 360px);
        opacity: 0;
      }
    }

    .page {
      max-width: 460px;
      margin: 0 auto;
      padding: 28px 22px 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ---------- Wordmark ---------- */
    .login-wordmark {
      text-align: center;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.2s forwards;
    }

    .login-wordmark .eyebrow {
      font-family: "Inter", sans-serif;
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }

    .login-wordmark h1 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-style: italic;
      font-size: 30px;
      letter-spacing: 0.01em;
      color: var(--ink);
      margin: 0;
    }

    /* ---------- Tree stage ---------- */
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-top: 4px;
    }

    .stage svg.tree {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Mother photo placed via foreignObject in SVG */
    .center-frame-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Sway groups */
    .sway {
      transform-box: fill-box;
      transform-origin: 50% 100%;
    }

    .sway-a {
      animation: swayA 5.2s ease-in-out infinite;
    }

    .sway-b {
      animation: swayB 4.6s ease-in-out infinite;
      animation-delay: -0.7s;
    }

    .sway-c {
      animation: swayC 5.8s ease-in-out infinite;
      animation-delay: -1.4s;
    }

    @keyframes swayA {

      0%,
      100% {
        transform: rotate(-1.2deg) translateY(0);
      }

      50% {
        transform: rotate(1.4deg) translateY(-1px);
      }
    }

    @keyframes swayB {

      0%,
      100% {
        transform: rotate(1.1deg) translateY(0);
      }

      50% {
        transform: rotate(-1.3deg) translateY(-1.2px);
      }
    }

    @keyframes swayC {

      0%,
      100% {
        transform: rotate(-0.9deg) translateY(0);
      }

      50% {
        transform: rotate(1.0deg) translateY(-0.8px);
      }
    }

    /* Frames hang with a gentle sway */
    .hang {
      transform-box: fill-box;
      transform-origin: 50% 0%;
    }

    .hang-1 {
      animation: hangA 4.8s ease-in-out infinite;
    }

    .hang-2 {
      animation: hangB 5.4s ease-in-out infinite;
      animation-delay: -0.6s;
    }

    .hang-3 {
      animation: hangA 5.0s ease-in-out infinite;
      animation-delay: -1.2s;
    }

    .hang-4 {
      animation: hangB 4.4s ease-in-out infinite;
      animation-delay: -0.9s;
    }

    @keyframes hangA {

      0%,
      100% {
        transform: rotate(-1.4deg);
      }

      50% {
        transform: rotate(1.2deg);
      }
    }

    @keyframes hangB {

      0%,
      100% {
        transform: rotate(1.2deg);
      }

      50% {
        transform: rotate(-1.4deg);
      }
    }

    /* Center frame glow */
    .center-frame-glow {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: breathe 3.6s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: 0.35;
        transform: scale(1);
      }

      50% {
        opacity: 0.85;
        transform: scale(1.06);
      }
    }

    /* Silhouettes warm gentle fade */
    .silhouettes {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: silhouetteBreathe 4.2s ease-in-out infinite;
    }

    @keyframes silhouetteBreathe {

      0%,
      100% {
        opacity: 0.78;
      }

      50% {
        opacity: 1.0;
      }
    }

    /* Sky elements: sun + clouds, drifting on a gentle breeze */
    .sun {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: sunArc 36s linear infinite, sunVisibility 36s linear infinite;
    }

    /* Sun travels in an arc across the sky synced with skyCycle */
    @keyframes sunArc {
      0% {
        transform: translate(-220px, 360px) scale(0.9);
      }

      /* dawn, low left */
      14% {
        transform: translate(-60px, -200px) scale(1.0);
      }

      /* morning */
      28% {
        transform: translate(0px, -260px) scale(1.0);
      }

      /* noon */
      42% {
        transform: translate(80px, -200px) scale(1.0);
      }

      56% {
        transform: translate(220px, 360px) scale(1.1);
      }

      /* sunset at horizon */
      62% {
        transform: translate(240px, 520px) scale(1.1);
      }

      /* dipped below */
      100% {
        transform: translate(-220px, 360px) scale(0.9);
      }
    }

    /* Sun is hidden once it dips below the horizon */
    @keyframes sunVisibility {
      0% {
        opacity: 0.85;
        filter: saturate(1.3);
      }

      14%,
      42% {
        opacity: 1;
        filter: saturate(0.9);
      }

      56% {
        opacity: 1;
        filter: saturate(1.5);
      }

      /* at horizon, glowing */
      60% {
        opacity: 0;
      }

      /* below horizon: vanish */
      99% {
        opacity: 0;
      }

      100% {
        opacity: 0.85;
        filter: saturate(1.3);
      }
    }

    /* Moon appears only at night */
    .moon {
      animation: moonShow 32s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes moonShow {

      0%,
      60% {
        opacity: 0;
        transform: translateY(-20px);
      }

      72% {
        opacity: 0.7;
        transform: translateY(0);
      }

      85% {
        opacity: 1;
        transform: translateY(0);
      }

      95% {
        opacity: 0.7;
        transform: translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateY(-20px);
      }
    }

    .star {
      animation: twinkle 3s ease-in-out infinite;
      opacity: 0;
    }

    .stars {
      animation: starsShow 32s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes starsShow {

      0%,
      60% {
        opacity: 0;
      }

      72% {
        opacity: 0.6;
      }

      85% {
        opacity: 1;
      }

      95% {
        opacity: 0.6;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.35;
      }

      50% {
        opacity: 1;
      }
    }

    /* Canopy seasons cycle — hue + saturation shift to suggest spring → summer → autumn → winter */
    .canopy-seasons {
      animation: seasonCycle 32s ease-in-out infinite;
    }

    @keyframes seasonCycle {
      0% {
        filter: hue-rotate(0deg) saturate(1) brightness(1);
      }

      /* spring */
      18% {
        filter: hue-rotate(-8deg) saturate(1.15) brightness(1.02);
      }

      /* summer */
      38% {
        filter: hue-rotate(-5deg) saturate(1.1) brightness(1);
      }

      /* late summer */
      55% {
        filter: hue-rotate(50deg) saturate(0.85) brightness(0.95);
      }

      /* autumn / sunset */
      72% {
        filter: hue-rotate(20deg) saturate(0.5) brightness(0.75);
      }

      /* late autumn / dusk */
      85% {
        filter: hue-rotate(0deg) saturate(0.3) brightness(0.45);
      }

      /* winter night */
      100% {
        filter: hue-rotate(0deg) saturate(1) brightness(1);
      }

      /* back to spring */
    }

    .cloud-1 {
      animation: drift1 42s linear infinite;
    }

    .cloud-2 {
      animation: drift2 56s linear infinite;
    }

    .cloud-3 {
      animation: drift1 64s linear infinite;
      animation-delay: -22s;
    }

    @keyframes drift1 {
      0% {
        transform: translateX(-80px);
      }

      100% {
        transform: translateX(700px);
      }
    }

    @keyframes drift2 {
      0% {
        transform: translateX(680px);
      }

      100% {
        transform: translateX(-120px);
      }
    }

    /* Tree cast-shadow — soft cool tone pooling under the canopy where the family stands */
    .tree-shadow {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: shadowBreathe 5.4s ease-in-out infinite;
    }

    @keyframes shadowBreathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.55;
      }

      50% {
        transform: scale(1.03);
        opacity: 0.72;
      }
    }

    /* Fireflies / particle layer */
    /* Birds flying across the scene */
    .bird-flock-1 {
      animation: birdsAcross1 18s linear infinite;
    }

    .bird-flock-2 {
      animation: birdsAcross2 22s linear infinite;
      animation-delay: -8s;
    }

    @keyframes birdsAcross1 {
      0% {
        transform: translate(-60px, 10px);
        opacity: 0;
      }

      8% {
        opacity: 1;
      }

      50% {
        transform: translate(300px, -8px);
        opacity: 1;
      }

      92% {
        opacity: 1;
      }

      100% {
        transform: translate(680px, -22px);
        opacity: 0;
      }
    }

    @keyframes birdsAcross2 {
      0% {
        transform: translate(640px, 60px);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      50% {
        transform: translate(300px, 50px);
        opacity: 0.9;
      }

      90% {
        opacity: 0.9;
      }

      100% {
        transform: translate(-80px, 38px);
        opacity: 0;
      }
    }

    .bird-wing-a {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: flap 0.45s ease-in-out infinite;
    }

    .bird-wing-b {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: flap 0.52s ease-in-out infinite;
      animation-delay: -0.18s;
    }

    .bird-wing-c {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: flap 0.40s ease-in-out infinite;
      animation-delay: -0.10s;
    }

    @keyframes flap {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(0.45);
      }
    }

    /* Breeze wind streaks brushing past the family */
    .breeze-streak {
      transform-box: fill-box;
      transform-origin: 0% 50%;
    }

    .breeze-1 {
      animation: breeze 4.2s ease-in-out infinite;
    }

    .breeze-2 {
      animation: breeze 5.0s ease-in-out infinite;
      animation-delay: -1.2s;
    }

    .breeze-3 {
      animation: breeze 4.6s ease-in-out infinite;
      animation-delay: -2.4s;
    }

    @keyframes breeze {
      0% {
        transform: translateX(-40px) scaleX(0.4);
        opacity: 0;
      }

      20% {
        opacity: 0.55;
      }

      60% {
        opacity: 0.55;
      }

      100% {
        transform: translateX(140px) scaleX(1);
        opacity: 0;
      }
    }

    /* Sunset wash behind the tree */
    .sunset-wash {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: sunsetBreathe 8s ease-in-out infinite;
    }

    @keyframes sunsetBreathe {

      0%,
      100% {
        opacity: 0.55;
      }

      50% {
        opacity: 0.85;
      }
    }

    /* Original fireflies / particles layer */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 215, 134, 0.95) 0%, rgba(168, 215, 134, 0.0) 70%);
      bottom: 14%;
      opacity: 0;
      will-change: transform, opacity;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(0.8);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      50% {
        opacity: 0.7;
      }

      100% {
        transform: translate(var(--dx, 0), -260px) scale(1.1);
        opacity: 0;
      }
    }

    /* ---------- Dedication ---------- */
    .dedication {
      text-align: center;
      margin-top: 6px;
      padding: 0 14px;
      opacity: 0;
      animation: fadeIn 1.6s ease-out 1.0s forwards;
    }

    .rule {
      width: 38px;
      height: 1px;
      background: var(--green-1);
      margin: 0 auto 14px;
      opacity: 0.55;
    }

    .dedication .line-1 {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 500;
      font-size: 21px;
      line-height: 1.35;
      color: #2a3326;
      margin: 0 0 8px;
      letter-spacing: 0.005em;
    }

    .dedication .line-1 .accent {
      color: var(--green-1);
      font-weight: 600;
    }

    .dedication .line-2 {
      font-family: "Inter", sans-serif;
      font-size: 11.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 0;
    }

    .dedication .line-2 .sep {
      display: inline-block;
      width: 6px;
      height: 1px;
      background: var(--ink-soft);
      vertical-align: middle;
      margin: 0 8px;
      opacity: 0.6;
    }

    /* ---------- Login form ---------- */
    .form {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 1.6s forwards;
    }

    .field {
      position: relative;
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 9px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 26px 14px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font-family: "Inter", sans-serif;
      font-size: 15px;
      color: var(--ink);
      transition: border-color .18s ease, box-shadow .18s ease;
      -webkit-appearance: none;
      outline: none;
    }

    .field input:hover {
      border-color: #c8d2c0;
    }

    .field input:focus {
      border-color: var(--green-1);
      box-shadow: 0 0 0 4px rgba(45, 122, 45, 0.10);
    }

    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2px 2px 4px;
      font-size: 12.5px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-soft);
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      accent-color: var(--green-1);
    }

    .forgot {
      color: var(--green-1);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    button.signin {
      margin-top: 4px;
      width: 100%;
      padding: 15px 16px;
      background: var(--green-1);
      color: #fff;
      border: 0;
      border-radius: 10px;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform .12s ease, background .15s ease, box-shadow .15s ease;
      box-shadow: 0 6px 18px -8px rgba(45, 122, 45, 0.55);
    }

    button.signin:hover {
      background: #266a26;
    }

    button.signin:active {
      transform: translateY(1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink-soft);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin: 8px 0 2px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .new-here {
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      margin: 0;
    }

    .new-here a {
      color: var(--green-1);
      font-weight: 600;
      text-decoration: none;
    }

    .new-here a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /* ---------- Top Tabs ---------- */
    .top-tabs {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-20px);
      transition: all 0.5s ease;
    }

    .top-tabs.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .top-tabs button {
      background: none;
      border: none;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .top-tabs button:hover {
      background: var(--line-soft);
      color: var(--ink);
    }

    .top-tabs button.active {
      color: var(--green-1);
      background: rgba(45, 122, 45, 0.1);
      font-weight: 600;
    }

    /* ---------- Multi-Step Form ---------- */
    .form-step {
      display: none;
      animation: fadeInStep 0.4s ease-out forwards;
    }

    .form-step.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @keyframes fadeInStep {
      from {
        opacity: 0;
        transform: translateX(10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* DOB Input Styling */
    .dob-container {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dob-container input[type="text"] {
      flex: 1;
    }

    .dob-container input[type="date"] {
      position: absolute;
      opacity: 0;
      width: 40px;
      height: 40px;
      right: 0;
      top: 0;
      cursor: pointer;
    }

    .calendar-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--line-soft);
      border-radius: 10px;
      color: var(--ink-soft);
      position: relative;
    }

    .calendar-icon svg {
      width: 20px;
      height: 20px;
    }

    /* Auth Code Input */
    .totp-box {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .totp-d {
      width: 40px;
      height: 48px;
      border: 0.5px solid rgba(90, 60, 30, .25);
      border-radius: 8px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--g-text, #1a3a2a);
    }

    .totp-d:focus {
      border-color: var(--g-text, #1a3a2a);
      outline: none;
    }
  


  :root {
    --bg: #f7f1e3;
    --bg-deep: #ede4cc;
    --paper: #fdfaf3;          /* card interior — subtle warm off-white */
    --paper-pure: #ffffff;     /* chrome surfaces — solid white */
    --ink: #2a3326;
    --ink-soft: #6b7a63;
    --ink-faint: #97a08f;
    --line: #d8d0b8;
    --line-soft: #e8e1c8;
    --trunk: #5C3317;
    --trunk-dark: #3e2210;
    --wood: #8a5a36;
    --wood-light: #a06d44;
    --wood-shadow: #5C3317;
    --green-1: #2D7A2D;
    --green-2: #4CAF50;
    --green-3: #81C784;
    --green-4: #A5D6A7;
    --green-faint: #e7f2e5;
    --cream: #f5efdf;
    --cream-edge: #e7dfca;
    --sunset-1: #f6a96b;
    --sunset-2: #e6824a;
    --sunset-3: #b85a2a;
    --sunset-glow: #ffd9a8;
    --me: #b85a2a;          /* warm sunset accent for the logged-in user */
    --me-soft: #ffe4cc;
    --shadow-card: 0 2px 6px -2px rgba(60, 35, 15, 0.18), 0 8px 24px -12px rgba(60, 35, 15, 0.22);
    --shadow-card-hover: 0 4px 10px -3px rgba(60, 35, 15, 0.28), 0 14px 32px -10px rgba(60, 35, 15, 0.32);
  }

  * { box-sizing: border-box; }

  
  body.logged-in {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }


  @keyframes skyCycle {
    0%   { background: linear-gradient(to bottom, #ffcfa8 0%, #ffe8d0 40%, #fffaf0 100%); }   /* sunrise */
    14%  { background: linear-gradient(to bottom, #b7e0f2 0%, #e0f0fa 50%, #ffffff 100%); }   /* spring day */
    28%  { background: linear-gradient(to bottom, #aedcf0 0%, #ddeefa 50%, #ffffff 100%); }   /* summer */
    42%  { background: linear-gradient(to bottom, #b8c8d4 0%, #c8d4dc 50%, #d8e0e4 100%); }   /* rainy / monsoon */
    56%  { background: linear-gradient(to bottom, #f6a96b 0%, #ffcfa8 45%, #ffe6d0 100%); }   /* autumn sunset */
    70%  { background: linear-gradient(to bottom, #6a4e7a 0%, #3d3654 50%, #20243c 100%); }   /* dusk */
    84%  { background: linear-gradient(to bottom, #cfe0ec 0%, #e4ecf2 50%, #f4f7fa 100%); }   /* winter day */
    92%  { background: linear-gradient(to bottom, #1a2540 0%, #15203a 50%, #0e1830 100%); }   /* winter night */
    100% { background: linear-gradient(to bottom, #ffcfa8 0%, #ffe8d0 40%, #fffaf0 100%); }
  }

  /* Text color cycles with the sky so it stays legible against changing backgrounds */
  @keyframes textCycle {
    0%   { color: #3a2418; }
    28%  { color: #2a3326; }
    42%  { color: #2c3a44; }
    56%  { color: #3e2210; }
    70%  { color: #f0e4d6; }
    84%  { color: #2a3a48; }
    92%  { color: #f0e4d6; }
    100% { color: #3a2418; }
  }

  /* Subtle paper grain / aged warmth across the whole app */
  body.logged-in::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse 60% 35% at 50% 0%,    rgba(246,169,107,0.10) 0%, rgba(246,169,107,0) 70%),
      radial-gradient(ellipse 50% 30% at 50% 100%,  rgba(92,51,23,0.08)    0%, rgba(92,51,23,0)    70%);
  }
  body.logged-in::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(92,51,23,0.04) 0 1px, transparent 1.5px),
      radial-gradient(circle at 78% 64%, rgba(92,51,23,0.03) 0 1px, transparent 1.5px),
      radial-gradient(circle at 38% 88%, rgba(92,51,23,0.03) 0 1px, transparent 1.5px),
      radial-gradient(circle at 62% 12%, rgba(92,51,23,0.03) 0 1px, transparent 1.5px);
    background-size: 220px 220px, 280px 280px, 320px 320px, 260px 260px;
    opacity: 0.45;
  }

  /* =====================================================
     SKY LAYER — sun (arcs sunrise→noon→sunset), moon, stars
     ===================================================== */
  .sky-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .sun {
    position: absolute;
    left: 0; top: 0;
    width: 96px; height: 96px;
    border-radius: 50%;
    background: radial-gradient(circle, #e6824a 0%, #e6824a 18%, #f6a96b 42%, #ffd9a8 72%, rgba(255,217,168,0) 100%);
    will-change: transform, opacity;
    animation: sunArc 36s linear infinite, sunVisibility 36s linear infinite;
  }
  /* Sun travels in an arc across the sky synced with skyCycle (matches v5) */
  @keyframes sunArc {
    0%   { transform: translate(-10vw, 75vh) scale(0.9); }   /* dawn, low left */
    14%  { transform: translate(33vw,  21vh) scale(1.0); }   /* morning */
    28%  { transform: translate(50vw,  15vh) scale(1.0); }   /* near noon */
    42%  { transform: translate(72vw,  21vh) scale(1.0); }
    56%  { transform: translate(110vw, 75vh) scale(1.1); }   /* sunset at horizon */
    62%  { transform: translate(115vw, 92vh) scale(1.1); }   /* dipped below */
    100% { transform: translate(-10vw, 75vh) scale(0.9); }
  }
  /* Sun is hidden once it dips below the horizon */
  @keyframes sunVisibility {
    0%   { opacity: 0.85; filter: saturate(1.3); }
    14%, 42% { opacity: 1; filter: saturate(0.9); }
    56%  { opacity: 1; filter: saturate(1.5); }   /* at horizon, glowing */
    60%  { opacity: 0; }                          /* below horizon: vanish */
    99%  { opacity: 0; }
    100% { opacity: 0.85; filter: saturate(1.3); }
  }

  /* Moon appears only at night */
  .moon {
    position: absolute;
    top: 12vh;
    right: 18vw;
    width: 56px; height: 56px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 38%, #fff5e0 0%, #f8efd0 55%, rgba(248,239,208,0) 100%);
    box-shadow: 0 0 28px rgba(255, 245, 224, 0.35);
    opacity: 0;
    animation: moonShow 36s ease-in-out infinite;
  }
  .moon::before, .moon::after {
    content: "";
    position: absolute;
    background: #e6dcb8;
    border-radius: 50%;
    opacity: 0.55;
  }
  .moon::before { width: 6px; height: 6px; top: 16px; left: 30px; }
  .moon::after  { width: 4px; height: 4px; top: 30px; left: 18px; }
  @keyframes moonShow {
    0%, 60%   { opacity: 0; transform: translateY(-20px); }
    72%       { opacity: 0.7; transform: translateY(0); }
    85%       { opacity: 1; transform: translateY(0); }
    95%       { opacity: 0.7; transform: translateY(0); }
    100%      { opacity: 0; transform: translateY(-20px); }
  }

  .stars {
    position: absolute; inset: 0;
    opacity: 0;
    animation: starsShow 36s ease-in-out infinite;
  }
  @keyframes starsShow {
    0%, 60%   { opacity: 0; }
    72%       { opacity: 0.6; }
    85%       { opacity: 1; }
    95%       { opacity: 0.6; }
    100%      { opacity: 0; }
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fffaf0;
    border-radius: 50%;
    box-shadow: 0 0 4px rgba(255, 250, 240, 0.6);
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1; }
  }

  /* ============================================================
     CANVAS — full viewport, infinitely pannable
     ============================================================ */
  .canvas {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: grab;
    background: transparent;
    touch-action: none;
    z-index: 2;
  }
  .canvas.dragging { cursor: grabbing; }
  .world {
    position: absolute;
    left: 50%;
    /* Origin shifted down so content sits well BELOW the top chrome.
       Top chrome is ~150px tall on desktop, ~130px on mobile; we add a
       generous buffer so panning up from "Me" doesn't bury ancestors. */
    top: calc(50% + 130px);
    width: 0;
    height: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  @media (max-width: 768px) {
    .world { top: calc(50% + 90px); }
  }
  .world.animating { transition: transform 600ms cubic-bezier(.65,.05,.36,1); }

  /* SVG layer underneath nodes for connector lines */
  .lines {
    position: absolute;
    left: -3000px;
    top: -2400px;
    width: 6000px;
    height: 4800px;
    pointer-events: none;
    overflow: visible;
  }
  .line {
    fill: none;
    stroke: #6b4222;
    stroke-width: 3.2;
    stroke-linecap: round;
    opacity: 0.7;
    transition: opacity .25s ease, stroke .25s ease, stroke-width .25s ease;
  }
  .line.dimmed { opacity: 0.12; }
  .line.highlighted {
    stroke: var(--green-1);
    stroke-width: 3.6;
    opacity: 1;
    filter: drop-shadow(0 0 4px rgba(45,122,45,0.45));
  }
  .line.spouse {
    stroke-dasharray: 5 5;
    stroke-width: 2;
    stroke: #8a5a36;
    opacity: 0.65;
  }
  .line.spouse.highlighted {
    stroke: var(--sunset-2);
    filter: drop-shadow(0 0 4px rgba(232,130,74,0.5));
  }
  .marriage-knot {
    fill: var(--wood);
    transition: fill .25s ease, transform .25s ease;
  }
  .marriage-knot.highlighted { fill: var(--sunset-2); }

  /* ============================================================
     NODE CARDS — hanging wooden frames
     ============================================================ */
  .node {
    position: absolute;
    width: 168px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    user-select: none;
    transition: opacity .3s ease, transform .35s cubic-bezier(.5,.1,.3,1.3);
    will-change: transform, opacity;
  }
  /* The little hanging string above each node */
  .node::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -18px;
    width: 1px;
    height: 18px;
    background: linear-gradient(to bottom, transparent 0%, rgba(122,90,50,0.4) 40%, rgba(122,90,50,0.7) 100%);
    transform: translateX(-0.5px);
  }
  .node::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    width: 10px;
    height: 4px;
    border-radius: 1.5px;
    background: var(--trunk);
    transform: translateX(-50%);
    box-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }
  .node-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 12px 12px;
    background: var(--paper);
    border-radius: 4px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(92,51,23,0.12);
    /* Wood frame look */
    background-image:
      linear-gradient(to right, rgba(140,90,50,0.18) 0 8px, transparent 8px calc(100% - 8px), rgba(140,90,50,0.18) calc(100% - 8px) 100%),
      linear-gradient(to bottom, rgba(140,90,50,0.18) 0 8px, transparent 8px calc(100% - 8px), rgba(140,90,50,0.18) calc(100% - 8px) 100%);
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .node:hover .node-card {
    transform: translateY(-2px);
    box-shadow: var(--shadow-card-hover);
  }
  /* slight tilt for character — every other node tilts opposite */
  .node:nth-child(odd) .node-card { transform: rotate(-0.6deg); }
  .node:nth-child(even) .node-card { transform: rotate(0.6deg); }
  .node:hover:nth-child(odd) .node-card { transform: rotate(-0.6deg) translateY(-2px); }
  .node:hover:nth-child(even) .node-card { transform: rotate(0.6deg) translateY(-2px); }

  .node-thumb {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--green-4);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 20px;
    overflow: hidden;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(92,51,23,0.18), 0 2px 4px rgba(60,35,15,0.18);
    flex-shrink: 0;
  }
  .node-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .node-name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-style: italic;
    font-size: 16px;
    line-height: 1.1;
    color: var(--ink);
    text-align: center;
    max-width: 100%;
    overflow-wrap: break-word;
  }
  .node-rel {
    font-family: "Inter", sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.2;
  }

  /* Deceased indicator: small leaf in upper-right of card */
  .node.deceased .node-card::after {
    content: "";
    position: absolute;
    top: 5px;
    right: 5px;
    width: 12px;
    height: 12px;
    background: var(--green-1);
    clip-path: path("M6 0 C 11 3, 12 8, 6 12 C 0 8, 1 3, 6 0 Z");
    opacity: 0.85;
  }
  .node.deceased .node-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: linear-gradient(to bottom, rgba(232,224,194,0.0) 0%, rgba(122,90,50,0.08) 100%);
    pointer-events: none;
  }
  .node.deceased .node-thumb { filter: saturate(0.7) brightness(0.97); }
  .node.deceased .node-name { font-style: italic; }

  /* Logged-in user — Me — gets a warm sunset glow & cord */
  .node.me .node-card {
    border-color: rgba(184,90,42,0.45);
    box-shadow:
      0 0 0 3px rgba(255,217,168,0.45),
      0 4px 10px -3px rgba(60,35,15,0.28),
      0 14px 32px -10px rgba(60,35,15,0.32);
    background-image:
      linear-gradient(to right, rgba(184,90,42,0.28) 0 8px, transparent 8px calc(100% - 8px), rgba(184,90,42,0.28) calc(100% - 8px) 100%),
      linear-gradient(to bottom, rgba(184,90,42,0.28) 0 8px, transparent 8px calc(100% - 8px), rgba(184,90,42,0.28) calc(100% - 8px) 100%);
  }
  .node.me .node-thumb {
    background: var(--sunset-2);
    box-shadow: 0 0 0 2px var(--me-soft), 0 0 0 3px rgba(184,90,42,0.45);
  }
  .node.me::before { background: linear-gradient(to bottom, transparent 0%, rgba(184,90,42,0.5) 40%, rgba(184,90,42,0.85) 100%); }
  .node.me::after  { background: var(--me); }
  .node.me .node-tag-me {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--me);
    color: #fff;
    font-family: "Inter", sans-serif;
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 0.22em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(184,90,42,0.4);
  }

  /* Filter dim/highlight states */
  .node.dim {
    opacity: 0.28;
    filter: saturate(0.6);
  }
  .node.match {
    z-index: 2;
  }
  .node.match .node-card {
    box-shadow:
      0 0 0 2px var(--green-3),
      0 0 0 6px rgba(165,214,167,0.5),
      var(--shadow-card-hover);
  }
  .node.match:nth-child(odd) .node-card  { transform: rotate(-0.6deg) scale(1.06); }
  .node.match:nth-child(even) .node-card { transform: rotate(0.6deg)  scale(1.06); }

  .node.on-path .node-card {
    box-shadow:
      0 0 0 2px var(--green-1),
      0 0 0 7px rgba(45,122,45,0.22),
      var(--shadow-card-hover);
  }
  .node.endpoint .node-card {
    box-shadow:
      0 0 0 2px var(--sunset-2),
      0 0 0 8px rgba(232,130,74,0.28),
      var(--shadow-card-hover);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px var(--sunset-2), 0 0 0 8px rgba(232,130,74,0.28), var(--shadow-card-hover); }
    50%      { box-shadow: 0 0 0 2px var(--sunset-2), 0 0 0 14px rgba(232,130,74,0.10), var(--shadow-card-hover); }
  }

  /* ============================================================
     TOP CHROME — wordmark, search, filter tags
     ============================================================ */
  .top-chrome {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 30;
    padding: 14px 24px 12px;
    background: #ffffff;
    border-bottom: 1px solid rgba(92,51,23,0.10);
    box-shadow: 0 2px 14px -4px rgba(60, 35, 15, 0.10);
  }

  .chrome-row {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 760px;
    margin: 0 auto;
  }
  .wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1;
    flex-shrink: 0;
    margin-right: 6px;
    color: var(--ink);
    text-decoration: none;
    padding: 4px 0;
  }
  .wordmark:hover { text-decoration: none; }
  .wordmark .name { white-space: nowrap; }
  .wordmark .eyebrow {
    font-family: "Inter", sans-serif;
    font-size: 8.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .wordmark .name {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 600;
    font-size: 19px;
    color: var(--ink);
    letter-spacing: 0.005em;
  }

  /* Search */
  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-input {
    width: 100%;
    height: 44px;
    padding: 0 14px 0 42px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 22px;
    font-family: "Inter", sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    -webkit-appearance: none;
  }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-input:focus {
    border-color: var(--green-1);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(45,122,45,0.10);
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--ink-soft);
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 0;
    background: rgba(92,51,23,0.12);
    color: var(--ink-soft);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .search-clear.visible { display: flex; }
  .search-clear:hover { background: rgba(92,51,23,0.22); color: var(--ink); }

  .search-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    max-height: 340px;
    overflow-y: auto;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 12px 36px -8px rgba(60,35,15,0.20), 0 4px 12px rgba(60,35,15,0.08);
    display: none;
    z-index: 35;
  }
  .search-dropdown.open { display: block; }
  .search-result {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--line-soft);
    transition: background .12s ease;
  }
  .search-result:last-child { border-bottom: 0; }
  .search-result:hover, .search-result.active { background: var(--green-faint); }
  .sr-thumb {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--green-4); color: #fff;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600; font-size: 13px;
    overflow: hidden;
    border: 1.5px solid #fff;
    box-shadow: 0 0 0 1px rgba(92,51,23,0.18);
  }
  .sr-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .sr-meta {
    display: flex; flex-direction: column; line-height: 1.15;
    flex: 1; min-width: 0;
  }
  .sr-name {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
  }
  .sr-rel {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .sr-empty {
    padding: 18px 14px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
    font-family: "Cormorant Garamond", serif;
  }

  /* Language toggle button */
  .lang-toggle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 38px;
    padding: 0 14px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 19px;
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    transition: background .15s ease, border-color .15s ease, color .15s ease;
    user-select: none;
    flex-shrink: 0;
    margin-right: 8px;
  }
  .lang-toggle-btn:hover {
    background: #fdfaf3;
    border-color: rgba(184,90,42,0.4);
    color: var(--sunset-2);
  }

  /* Profile chip on the right */
  .me-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px 4px 4px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 22px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s ease, border-color .15s ease;
  }
  .me-chip:hover { background: #fdfaf3; border-color: rgba(184,90,42,0.4); }
  .me-chip .mc-thumb {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--sunset-2); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600; font-size: 14px;
    border: 1.5px solid #fff;
    box-shadow: 0 0 0 1px rgba(184,90,42,0.4);
  }
  .me-chip .mc-name {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
  }

  /* Filter tags row */
  .tags-row {
    margin: 12px auto 0;
    max-width: 1000px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 7px;
    padding: 4px 20px 12px;
  }
  .tag {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 18px;
    font-family: "Inter", sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease;
    scroll-snap-align: start;
    white-space: nowrap;
  }
  .tag:hover { background: #fdfaf3; border-color: rgba(92,51,23,0.28); }
  .tag.active {
    background: var(--green-1);
    color: #fff;
    border-color: var(--green-1);
    box-shadow: 0 4px 12px -2px rgba(45,122,45,0.45);
  }
  .tag.disabled {
    opacity: 0.45;
    cursor: not-allowed;
    color: var(--ink-faint);
  }
  .tag-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    background: #f3eee0;
    border-radius: 9px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .tag.active .tag-count {
    background: rgba(255,255,255,0.22);
    color: #fff;
  }

  /* ============================================================
     ZOOM CONTROLS (bottom-right)
     ============================================================ */
  .zoom-ctrls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 4px;
    box-shadow: 0 6px 20px rgba(60,35,15,0.10);
  }
  .zoom-btn {
    width: 34px; height: 34px;
    border: 0;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink);
    font-size: 16px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s ease;
  }
  .zoom-btn:hover { background: rgba(92,51,23,0.10); }
  .zoom-btn svg { width: 16px; height: 16px; }

  /* Mini-map */
  .minimap {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 20;
    width: 180px;
    height: 120px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(60,35,15,0.10);
  }
  .minimap-canvas { width: 100%; height: 100%; display: block; }
  .minimap-viewport {
    position: absolute;
    border: 1.5px solid var(--green-1);
    background: rgba(45,122,45,0.10);
    pointer-events: none;
    border-radius: 2px;
  }

  /* Status pill — top middle, shows active filter / selection breadcrumb */
  .status-pill {
    position: fixed;
    top: 124px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    z-index: 25;
    background: rgba(45,122,45,0.94);
    backdrop-filter: blur(8px);
    color: #fff;
    padding: 8px 14px 8px 12px;
    border-radius: 14px;
    font-family: "Inter", sans-serif;
    font-size: 12px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 6px 18px rgba(45,122,45,0.28);
    max-width: calc(100vw - 40px);
    opacity: 0;
    transition: opacity .25s ease, transform .25s ease;
  }
  .status-pill.visible { display: inline-flex; opacity: 1; transform: translateX(-50%) translateY(0); }
  .status-pill.is-path { background: rgba(184,90,42,0.94); box-shadow: 0 6px 18px rgba(184,90,42,0.32); }
  .status-pill .breadcrumb {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    line-height: 1.3;
  }
  .status-pill .bc-arrow { opacity: 0.55; font-size: 10px; }
  .status-pill .bc-name { font-weight: 600; font-style: italic; font-family: "Cormorant Garamond", serif; font-size: 14px; }
  .status-pill .pill-close {
    border: 0;
    background: rgba(255,255,255,0.18);
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .status-pill .pill-close:hover { background: rgba(255,255,255,0.32); }

  /* ============================================================
     LIGHTBOX OVERLAY
     ============================================================ */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: stretch;
    justify-content: center;
    background: rgba(20,12,5,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    overflow-y: auto;
  }
  .lightbox.open { display: flex; }
  .lightbox-sheet {
    width: min(720px, 100%);
    margin: auto;
    background: #ffffff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(20,12,5,0.6);
    animation: sheetIn .35s cubic-bezier(.5,.1,.3,1.2);
    min-height: min(100%, 700px);
    max-width: 100%;
  }
  @keyframes sheetIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  .lb-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 0;
    background: rgba(20,12,5,0.45);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 5;
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s ease;
  }
  .lb-close:hover { background: rgba(20,12,5,0.7); }

  /* Cover photo zone */
  .lb-cover {
    position: relative;
    height: 220px;
    background: linear-gradient(135deg, #ffd9a8 0%, #f6a96b 40%, #b85a2a 100%);
    overflow: hidden;
  }
  .lb-cover-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.85;
  }
  .lb-cover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(20,12,5,0) 40%, rgba(251,246,231,0.5) 80%, var(--paper) 100%);
  }
  .lb-profile-photo {
    position: absolute;
    bottom: -56px;
    left: 50%;
    transform: translateX(-50%);
    width: 116px; height: 116px;
    border-radius: 50%;
    border: 4px solid var(--paper);
    background: var(--green-4);
    overflow: hidden;
    box-shadow: 0 8px 24px -6px rgba(20,12,5,0.4);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600; font-size: 38px;
    z-index: 2;
  }
  .lb-profile-photo img { width: 100%; height: 100%; object-fit: cover; }

  /* Profile header */
  .lb-header {
    padding: 72px 28px 22px;
    text-align: center;
    border-bottom: 1px solid var(--line-soft);
  }
  .lb-name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-style: italic;
    font-size: 36px;
    line-height: 1.05;
    color: var(--ink);
    margin: 0 0 8px;
    letter-spacing: 0.005em;
  }
  .lb-name .leaf {
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-left: 8px;
    vertical-align: middle;
    background: var(--green-1);
    clip-path: path("M6 0 C 11 3, 12 8, 6 12 C 0 8, 1 3, 6 0 Z");
    opacity: 0.85;
  }
  .lb-rel {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--green-1);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .lb-rel.is-me { color: var(--me); }
  .lb-life {
    font-family: "Inter", sans-serif;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 14px;
    letter-spacing: 0.06em;
  }
  .lb-life .sep {
    display: inline-block;
    width: 4px; height: 1px;
    background: var(--ink-soft);
    vertical-align: middle;
    margin: 0 8px;
    opacity: 0.6;
  }
  .lb-bio {
    font-family: "Cormorant Garamond", serif;
    font-size: 17px;
    line-height: 1.5;
    color: var(--ink);
    max-width: 460px;
    margin: 0 auto;
    text-wrap: pretty;
    font-style: italic;
  }
  .lb-bio::before, .lb-bio::after {
    content: "";
    display: inline-block;
    width: 30px; height: 1px;
    background: var(--green-1);
    vertical-align: middle;
    margin: 0 12px;
    opacity: 0.5;
  }

  /* Quick relations row inside lightbox */
  .lb-relations {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 16px 24px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .lb-rel-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 4px;
    background: rgba(165,214,167,0.18);
    border: 1px solid rgba(45,122,45,0.18);
    border-radius: 14px;
    font-family: "Inter", sans-serif;
    font-size: 11.5px;
    color: var(--ink);
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease;
  }
  .lb-rel-chip:hover {
    background: rgba(165,214,167,0.45);
    border-color: rgba(45,122,45,0.45);
  }
  .lb-rel-chip .lrc-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--green-3);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600; font-size: 10px;
    overflow: hidden;
  }
  .lb-rel-chip .lrc-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .lb-rel-chip .lrc-rel {
    color: var(--ink-soft);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-right: 4px;
  }

  /* Scrapbook timeline */
  .lb-timeline {
    padding: 26px 24px 36px;
  }
  .lb-timeline-title {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    text-align: center;
    margin: 0 0 6px;
  }
  .lb-timeline-sub {
    text-align: center;
    font-family: "Inter", sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 24px;
  }
  .lb-timeline-sub .sep {
    display: inline-block; width: 16px; height: 1px;
    background: var(--ink-soft); opacity: 0.5;
    vertical-align: middle; margin: 0 8px;
  }
  .lb-timeline-list {
    position: relative;
    padding-left: 28px;
  }
  .lb-timeline-list::before {
    content: "";
    position: absolute;
    left: 9px;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: linear-gradient(to bottom, var(--green-3) 0%, var(--green-1) 50%, var(--wood) 100%);
    border-radius: 1px;
  }
  .scrap-card {
    position: relative;
    background: #fff;
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 14px 16px 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(60,35,15,0.06);
  }
  .scrap-card::before {
    content: "";
    position: absolute;
    left: -25px;
    top: 18px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--paper);
    border: 2px solid var(--green-1);
  }
  .scrap-date {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--green-1);
    margin-bottom: 8px;
  }
  .scrap-photos {
    display: grid;
    gap: 4px;
    margin-bottom: 10px;
    border-radius: 6px;
    overflow: hidden;
  }
  .scrap-photos.count-1 { grid-template-columns: 1fr; }
  .scrap-photos.count-2 { grid-template-columns: 1fr 1fr; }
  .scrap-photos.count-3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
  .scrap-photos.count-3 .scrap-photo:nth-child(1) { grid-row: span 2; }
  .scrap-photo {
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, var(--cream), var(--cream-edge));
    border-radius: 4px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .scrap-photo svg { width: 38%; height: 38%; opacity: 0.4; }
  .scrap-photo.has-photo { background: #f7f1e3; }
  .scrap-photo img { width: 100%; height: 100%; object-fit: cover; }
  .scrap-caption {
    font-family: "Cormorant Garamond", serif;
    font-size: 16px;
    line-height: 1.45;
    color: var(--ink);
    text-wrap: pretty;
    font-style: italic;
    margin-bottom: 10px;
  }
  .scrap-tags {
    display: flex; flex-wrap: wrap; gap: 5px 6px;
    align-items: center;
  }
  .scrap-tags .label {
    font-family: "Inter", sans-serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 2px;
  }
  .scrap-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px 2px 3px;
    background: var(--green-faint);
    border: 1px solid rgba(45,122,45,0.18);
    border-radius: 12px;
    font-family: "Inter", sans-serif;
    font-size: 10.5px;
    color: var(--ink);
    cursor: pointer;
    transition: background .12s ease;
  }
  .scrap-tag:hover { background: rgba(165,214,167,0.5); }
  .scrap-tag .st-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--green-3);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600; font-size: 9px;
    overflow: hidden;
  }
  .scrap-tag .st-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* Empty timeline state */
  .scrap-empty {
    text-align: center;
    padding: 26px 12px;
    color: var(--ink-soft);
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 16px;
  }

  /* ============================================================
     MOBILE BOTTOM NAV — only on small screens
     ============================================================ */
  .mobile-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 28;
    display: none;
    background: #ffffff;
    border-top: 1px solid rgba(92,51,23,0.10);
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 16px rgba(60,35,15,0.06);
  }
  .mnav-inner {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
  }
  .mnav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 4px;
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 8px;
    transition: color .15s ease, background .15s ease;
  }
  .mnav-btn svg { width: 20px; height: 20px; }
  .mnav-btn span {
    font-family: "Inter", sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .mnav-btn.active { color: var(--green-1); }
  .mnav-btn:hover { background: rgba(92,51,23,0.06); }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 768px) {
    .top-chrome { padding: 10px 12px 0; }
    .wordmark { display: none; }
    .me-chip .mc-name { display: none; }
    .me-chip { padding: 4px; }
    .tags-row { padding: 4px 12px 8px; }
    .tag { padding: 6px 11px; font-size: 11.5px; }
    .zoom-ctrls { bottom: 84px; right: 12px; }
    .minimap { display: none; }
    .mobile-nav { display: block; }
    .node { width: 138px; }
    .node-card { padding: 10px 8px 9px; gap: 4px; }
    .node-thumb { width: 44px; height: 44px; font-size: 17px; }
    .node-name { font-size: 14px; }
    .node-rel { font-size: 8px; }
    .lightbox {
      align-items: flex-end;
    }
    .lightbox-sheet {
      width: 100%;
      min-height: 90vh;
      border-radius: 18px 18px 0 0;
      margin-bottom: 0;
      animation: sheetUp .35s cubic-bezier(.5,.1,.3,1.2);
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .lightbox::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 10vh;
      cursor: pointer;
    }
    .lb-cover { height: 180px; }

  <script>
    // Generate firefly particles
    (function () {
      const layer = document.getElementById('particles');
      if (!layer) return;
      const COUNT = 22;
      for (let i = 0; i < COUNT; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const left = 6 + Math.random() * 88;         // % across
        const size = 2 + Math.random() * 3.8;        // px
        const dx = (Math.random() - 0.5) * 160;    // breeze drift x
        const dur = 6 + Math.random() * 5;          // s
        const delay = -Math.random() * dur;          // start at random phase
        p.style.left = left + '%';
        p.style.width = p.style.height = size + 'px';
        p.style.setProperty('--dx', dx + 'px');
        p.style.animation = `drift ${dur}s linear ${delay}s infinite`;
        layer.appendChild(p);
      }
    })();
    // Rain
    (function () {
      const layer = document.getElementById('rain');
      if (!layer) return;
      for (let i = 0; i < 60; i++) {
        const d = document.createElement('span');
        d.className = 'rain-drop';
        d.style.left = (Math.random() * 100) + '%';
        d.style.top = (Math.random() * 60) + '%';
        d.style.animationDelay = (-Math.random() * 0.9) + 's';
        d.style.animationDuration = (0.7 + Math.random() * 0.5) + 's';
        layer.appendChild(d);
      }
    })();
    // Snow
    (function () {
      const layer = document.getElementById('snow');
      if (!layer) return;
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('span');
        s.className = 'snow-flake';
        s.style.left = (Math.random() * 100) + '%';
        s.style.top = (-Math.random() * 30) + '%';
        s.style.setProperty('--dx', ((Math.random() - 0.5) * 80) + 'px');
        s.style.animationDelay = (-Math.random() * 6) + 's';
        s.style.animationDuration = (5 + Math.random() * 4) + 's';
        s.style.opacity = 0.6 + Math.random() * 0.4;
        layer.appendChild(s);
      }
    })();

    // Multi-Step Form Logic
    let authData = null;
    let matchedUserEntry = null;

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('data/auth.json');
        authData = await res.json();
      } catch (e) {
        console.error('Failed to load auth.json:', e);
      }

      // Language Toggle logic
      window.CURRENT_LANG = 'EN';
      const langBtn = document.getElementById('lang-toggle');
      if (langBtn) {
        langBtn.addEventListener('click', () => {
          const nextLang = window.CURRENT_LANG === 'EN' ? 'MR' : 'EN';
          window.CURRENT_LANG = nextLang;
          langBtn.textContent = nextLang === 'EN' ? 'EN' : 'मराठी';
          if (window.updateLanguage) {
            window.updateLanguage(nextLang);
          }
        });
      }
    });

    function nextStep() {
      const pwd = document.getElementById('familyPassword').value;
      if (pwd.trim().toLowerCase() !== 'sathawane') {
        alert('Incorrect family password. Please try again.');
        return;
      }
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
    }

    // Format DOB as dd/mm/yyyy
    function formatDOB(input) {
      let val = input.value.replace(/\D/g, '');
      if (val.length > 2) val = val.slice(0, 2) + '/' + val.slice(2);
      if (val.length > 5) val = val.slice(0, 5) + '/' + val.slice(5, 9);
      input.value = val;
    }

    // Sync native date picker to the text field
    function syncDate(input) {
      if (!input.value) return;
      const parts = input.value.split('-'); // input.value is always yyyy-mm-dd
      if (parts.length === 3) {
        document.getElementById('dob').value = `${parts[2]}/${parts[1]}/${parts[0]}`;
      }
    }

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Complete Login and show Tabs
    async function nextStep2() {
      const name = document.getElementById('fullName').value.trim();
      const dob = document.getElementById('dob').value.trim();
      if (!name || !dob) {
        alert('Please fill out all fields.');
        return;
      }
      if (dob.length !== 10) {
        alert('Please enter a valid date of birth (dd/mm/yyyy).');
        return;
      }

      // Normalize name and DOB to match creation algorithm
      const nameNormalized = name.toLowerCase().replace(/\s+/g, '');
      const dobNormalized = dob.replace(/\D/g, '');
      const normalised = (nameNormalized + dobNormalized).replace(/[^a-z0-9]/g, '');
      const computedHash = await sha256(normalised);

      if (!authData || !authData.entries) {
        alert('Auth database is loading. Please wait a second and try again.');
        return;
      }

      const matched = authData.entries.find(e => e.hash === computedHash);
      if (!matched) {
        alert('Identity verification failed. Name or Date of Birth is incorrect.');
        return;
      }

      matchedUserEntry = matched;

      document.getElementById('step2').classList.remove('active');
      document.getElementById('step3').classList.add('active');
      setTimeout(() => document.querySelectorAll('.totp-d')[0].focus(), 100);
    }

    function totpInput(input, index) {
      if (input.value.length === 1 && index < 5) {
        document.querySelectorAll('.totp-d')[index + 1].focus();
      }
      // Simple backspace handling if empty
      if (input.value.length === 0 && index > 0 && event.key === 'Backspace') {
        document.querySelectorAll('.totp-d')[index - 1].focus();
      }
    }

    function totpPaste(event) {
      event.preventDefault();
      let paste = (event.clipboardData || window.clipboardData).getData('text');
      paste = paste.replace(/\D/g, '').substring(0, 6);
      const inputs = document.querySelectorAll('.totp-d');
      for (let i = 0; i < paste.length; i++) {
        inputs[i].value = paste[i];
      }
      if (paste.length > 0) {
        inputs[Math.min(paste.length, 5)].focus();
      }
    }

    function completeLogin() {
      const inputs = document.querySelectorAll('.totp-d');
      const code = Array.from(inputs).map(i => i.value).join('');
      if (code.length !== 6) {
        alert('Please enter the 6-digit authentication code.');
        return;
      }

      if (!matchedUserEntry) {
        alert('Session error. Please restart login.');
        location.reload();
        return;
      }

      // Validate TOTP if required
      if (matchedUserEntry.totpRequired && matchedUserEntry.totpSecret) {
        try {
          const totp = new OTPAuth.TOTP({
            issuer: "TheFamilyTree",
            label: matchedUserEntry.displayName,
            algorithm: "SHA1",
            digits: 6,
            period: 30,
            secret: OTPAuth.Secret.fromBase32(matchedUserEntry.totpSecret)
          });
          
          const delta = totp.validate({
            token: code,
            window: 1
          });
          
          if (delta === null) {
            alert('Invalid authentication code. Please try again.');
            return;
          }
        } catch (e) {
          console.error('TOTP validation error:', e);
          alert('Error validating code. Please try again.');
          return;
        }
      }

      // Hide login container
      document.getElementById('login-container').style.display = 'none';

      // Show canvas container
      document.getElementById('app-container').style.display = 'block';

      // Add logged-in class to body
      document.body.classList.add('logged-in');

      // Dynamically load scripts tree-helpers.js, tree-data.js and tree-app.js
      const cacheBust = '?v=' + Date.now();
      const s0 = document.createElement('script');
      s0.src = 'tree-helpers.js' + cacheBust;
      s0.onload = () => {
        const s1 = document.createElement('script');
        s1.src = 'tree-data.js' + cacheBust;
        s1.onload = () => {
          let initialMe = "HITESH_JYOTI_SHANKAR_SATHAWANE";
          
          const rawData = window.FAMILY_DATA || window.FAMILY;
          if (matchedUserEntry && rawData && rawData.persons) {
            const matchedRaw = rawData.persons.find(p => {
              const directName = `${p.firstName} ${p.lastName}`.toLowerCase();
              const targetName = matchedUserEntry.displayName.toLowerCase();
              if (directName === targetName) return true;
              
              if (p.gender === 'F' || p.gender === 'f') {
                const marriage = rawData.relationships.find(r => 
                  r.type === 'marriage' && (r.person1Id === p.id || r.person2Id === p.id)
                );
                if (marriage) {
                  const spouseId = marriage.person1Id === p.id ? marriage.person2Id : marriage.person1Id;
                  const husband = rawData.persons.find(h => h.id === spouseId && (h.gender === 'M' || h.gender === 'm'));
                  if (husband && husband.lastName) {
                    const marriedName = `${p.firstName} ${husband.lastName}`.toLowerCase();
                    if (marriedName === targetName) return true;
                  }
                }
              }
              return false;
            });
            if (matchedRaw) {
              initialMe = matchedRaw.id;
            }
          } else if (matchedUserEntry && window.FAMILY && window.FAMILY.people) {
            const matchedPerson = window.FAMILY.people.find(p => {
              const targetName = matchedUserEntry.displayName.toLowerCase();
              if (p.name.toLowerCase() === targetName) return true;
              const baseName = p.name.replace(/\s*\([^)]+\)/g, '').toLowerCase().trim();
              if (baseName === targetName) return true;
              return false;
            });
            if (matchedPerson) {
              initialMe = matchedPerson.id;
            }
          }

          if (window.FAMILY_DATA && window.processRawFamilyData) {
            window.FAMILY = window.processRawFamilyData(window.FAMILY_DATA, initialMe);
          } else if (window.FAMILY) {
            window.FAMILY.ME = initialMe;
          }

          // Update the ME Chip display to show the logged-in user!
          const meChipName = document.querySelector('#me-chip .mc-name');
          const meChipThumb = document.querySelector('#me-chip-thumb');
          const meChip = document.getElementById('me-chip');
          const mePerson = window.FAMILY.people.find(p => p.id === window.FAMILY.ME);
          if (mePerson) {
            meChipName.textContent = mePerson.firstName;
            meChipThumb.textContent = mePerson.firstName[0];
            meChip.title = `${mePerson.name} (you)`;
          }

          const s2 = document.createElement('script');
          s2.src = 'tree-app.js' + cacheBust;
          document.body.appendChild(s2);
        };
        document.body.appendChild(s1);
      };
      document.body.appendChild(s0);
    }
  </script>
</body>

</html>
